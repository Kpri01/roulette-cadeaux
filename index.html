<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roulette Cadeaux</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #0D23C9 0%, #0C121D 60%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #ECEEFE;
      overflow: hidden;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ECEEFE, #0D23C9, #ECEEFE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p.subtitle {
      font-size: 1rem;
      color: rgba(236, 238, 254, 0.55);
      margin-bottom: 36px;
      letter-spacing: 1px;
    }

    .wheel-wrapper {
      position: relative;
      width: 420px;
      height: 420px;
    }

    /* Outer glow ring */
    .wheel-wrapper::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #0D23C9, #ECEEFE, #0D23C9, #ECEEFE, #0D23C9);
      animation: spin-glow 6s linear infinite;
      z-index: 0;
      opacity: 0.55;
      filter: blur(8px);
    }

    @keyframes spin-glow {
      to { transform: rotate(360deg); }
    }

    canvas#wheel {
      position: relative;
      z-index: 1;
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(13, 35, 201, 0.5);
    }

    /* Pointer / arrow */
    .pointer {
      position: absolute;
      top: 50%;
      right: -28px;
      transform: translateY(-50%);
      z-index: 10;
      width: 0;
      height: 0;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      border-right: 44px solid #ECEEFE;
      filter: drop-shadow(0 0 8px rgba(236, 238, 254, 0.8));
    }

    /* Center hub */
    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ECEEFE 0%, #a0a8f0 60%, #6070d0 100%);
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      border: 4px solid #0C121D;
    }

    .btn-spin {
      margin-top: 40px;
      padding: 16px 56px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      background: #0D23C9;
      color: #ECEEFE;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(13, 35, 201, 0.5);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      z-index: 5;
    }

    .btn-spin:hover:not(:disabled) {
      transform: translateY(-3px);
      background: #1A30D6;
      box-shadow: 0 10px 32px rgba(13, 35, 201, 0.7);
    }

    .btn-spin:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Result overlay */
    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(12, 18, 29, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .result-overlay.show {
      display: flex;
    }

    .result-card {
      background: linear-gradient(135deg, #0C121D, #0D1A3A);
      border: 2px solid #0D23C9;
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 0 60px rgba(13, 35, 201, 0.4);
      animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 380px;
    }

    @keyframes pop-in {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    .result-emoji {
      font-size: 4rem;
      margin-bottom: 16px;
    }

    .result-title {
      font-size: 1rem;
      color: rgba(236, 238, 254, 0.55);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .result-prize {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ECEEFE, #0D23C9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 32px;
    }

    .btn-close {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid #0D23C9;
      border-radius: 50px;
      background: transparent;
      color: #ECEEFE;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .btn-close:hover {
      background: #0D23C9;
      color: #ECEEFE;
    }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 24px;
      max-width: 500px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: rgba(236, 238, 254, 0.75);
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <h1>Tentez votre chance !</h1>
  <p class="subtitle">Faites tourner la roue pour gagner votre cadeau</p>

  <div class="wheel-wrapper">
    <canvas id="wheel" width="420" height="420"></canvas>
    <div class="pointer"></div>
    <div class="hub"></div>
  </div>

  <button class="btn-spin" id="spinBtn" onclick="spin()">Tourner</button>

  <div class="legend" id="legend"></div>

  <!-- Result modal -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div id="resultMedia"></div>
      <div class="result-title">Felicitations ! Vous avez gagne :</div>
      <div class="result-prize" id="resultPrize"></div>
      <button class="btn-close" onclick="closeResult()">Rejouer</button>
    </div>
  </div>

  <script>
    // 4 shades derived from #0D23C9 and #ECEEFE palette
    const segments = [
      { label: "1 Booster\nPokemon",  weight: 75, color: "#0D23C9", image: "pokemon.png" },
      { label: "10€ de\nreduction",   weight: 12, color: "#2C41DC", emoji: "💸" },
      { label: "Une Paire\nOfferte",  weight: 8,  color: "#0A1A9A", emoji: "👟" },
      { label: "Paire de\nAirPods",   weight: 5,  color: "#4A5EE8", image: "airpods.png" },
    ];

    const total = segments.reduce((s, x) => s + x.weight, 0);
    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = 196;

    let currentAngle = 0;
    let spinning = false;

    // Preload images
    const loadedImages = {};
    let imagesToLoad = 0;
    let imagesLoaded = 0;

    function preloadImages(callback) {
      const imageSegments = segments.filter(s => s.image);
      imagesToLoad = imageSegments.length;
      if (imagesToLoad === 0) { callback(); return; }

      for (const seg of imageSegments) {
        const img = new Image();
        img.onload = () => {
          imagesLoaded++;
          if (imagesLoaded === imagesToLoad) callback();
        };
        img.onerror = () => {
          imagesLoaded++;
          if (imagesLoaded === imagesToLoad) callback();
        };
        img.src = seg.image;
        loadedImages[seg.image] = img;
      }
    }

    function getArcs() {
      const arcs = [];
      let start = 0;
      const sweep = (2 * Math.PI) / segments.length;
      for (const seg of segments) {
        arcs.push({ ...seg, start, sweep });
        start += sweep;
      }
      return arcs;
    }

    function drawWheel(rotation) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const arcs = getArcs();

      for (const arc of arcs) {
        const s = arc.start + rotation;
        const e = s + arc.sweep;

        // Slice
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, s, e);
        ctx.closePath();
        ctx.fillStyle = arc.color;
        ctx.fill();

        // Border
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, s, e);
        ctx.closePath();
        ctx.strokeStyle = 'rgba(236, 238, 254, 0.2)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(s + arc.sweep / 2);

        // Image → outer zone (near rim)
        if (arc.image && loadedImages[arc.image] && loadedImages[arc.image].complete) {
          const imgSize = 48;
          const imgCenterX = radius - 38; // 158px from center, close to rim
          ctx.drawImage(loadedImages[arc.image], imgCenterX - imgSize / 2, -imgSize / 2, imgSize, imgSize);
        }

        // Label → inner zone (away from image)
        ctx.textAlign = 'right';
        ctx.fillStyle = '#ECEEFE';
        ctx.font = 'bold 15px Segoe UI';
        ctx.shadowColor = 'rgba(0,0,0,0.6)';
        ctx.shadowBlur = 4;

        const lines = arc.label.split('\n');
        const lineH = 18;
        // With image: push text to inner half; without: center in slice
        const textR = arc.image ? radius - 100 : radius - 16;
        lines.forEach((line, i) => {
          const yOff = (i - (lines.length - 1) / 2) * lineH;
          ctx.fillText(line, textR, yOff + 5);
        });

        ctx.restore();
      }

      // Outer ring
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(236, 238, 254, 0.15)';
      ctx.lineWidth = 6;
      ctx.stroke();
    }

    // Build legend
    const legendEl = document.getElementById('legend');
    for (const seg of segments) {
      const item = document.createElement('div');
      item.className = 'legend-item';
      item.innerHTML = `<div class="legend-dot" style="background:${seg.color}; border: 1px solid rgba(236,238,254,0.3)"></div>${seg.label.replace('\n', ' ')}`;
      legendEl.appendChild(item);
    }

    preloadImages(() => drawWheel(currentAngle));

    function pickWinner() {
      const r = Math.random() * total;
      let acc = 0;
      for (let i = 0; i < segments.length; i++) {
        acc += segments[i].weight;
        if (r < acc) return i;
      }
      return segments.length - 1;
    }

    function spin() {
      if (spinning) return;
      spinning = true;
      document.getElementById('spinBtn').disabled = true;

      const arcs = getArcs();
      const winnerIndex = pickWinner();
      const winnerArc = arcs[winnerIndex];

      const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
      const winnerMid = winnerArc.start + winnerArc.sweep / 2;
      const jitter = (Math.random() - 0.5) * winnerArc.sweep * 0.6;
      const targetAngle = -winnerMid - jitter;

      const delta = (targetAngle - currentAngle % (2 * Math.PI) + 2 * Math.PI * 10 + extraSpins);
      const finalAngle = currentAngle + delta;

      const duration = 4500 + Math.random() * 1000;
      const startAngle = currentAngle;
      const startTime = performance.now();

      function easeOut(t) {
        return 1 - Math.pow(1 - t, 4);
      }

      function frame(now) {
        const elapsed = now - startTime;
        const t = Math.min(elapsed / duration, 1);
        currentAngle = startAngle + (finalAngle - startAngle) * easeOut(t);
        drawWheel(currentAngle);

        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          currentAngle = finalAngle;
          spinning = false;
          showResult(winnerIndex);
        }
      }

      requestAnimationFrame(frame);
    }

    function showResult(index) {
      const seg = segments[index];
      const mediaEl = document.getElementById('resultMedia');

      if (seg.image && loadedImages[seg.image]) {
        mediaEl.innerHTML = `<img class="result-img" src="${seg.image}" alt="${seg.label}">`;
      } else {
        mediaEl.innerHTML = `<div class="result-emoji">${seg.emoji}</div>`;
      }

      document.getElementById('resultPrize').textContent = seg.label.replace('\n', ' ');
      document.getElementById('resultOverlay').classList.add('show');
    }

    function closeResult() {
      document.getElementById('resultOverlay').classList.remove('show');
      document.getElementById('spinBtn').disabled = false;
    }
  </script>
</body>
</html>
