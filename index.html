<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Roulette Cadeaux</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0C121D;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #ECEEFE;
      overflow-x: hidden;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 10px;
      text-align: center;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ECEEFE, #0D23C9, #ECEEFE);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p.subtitle {
      font-size: 1rem;
      color: rgba(236, 238, 254, 0.55);
      margin-bottom: 28px;
      letter-spacing: 1px;
      text-align: center;
    }

    .spin-counter { display: none; }

    .wheel-wrapper {
      position: relative;
      width: 420px;
      height: 420px;
    }

    .wheel-wrapper::before {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #0D23C9, #ECEEFE, #0D23C9, #ECEEFE, #0D23C9);
      animation: spin-glow 6s linear infinite;
      z-index: 0;
      opacity: 0.55;
      filter: blur(8px);
    }

    @keyframes spin-glow { to { transform: rotate(360deg); } }

    canvas#wheel {
      position: relative;
      z-index: 1;
      border-radius: 50%;
      box-shadow: 0 0 40px rgba(13, 35, 201, 0.5);
    }

    .pointer {
      position: absolute;
      top: 50%;
      right: -28px;
      transform: translateY(-50%);
      z-index: 10;
      width: 0;
      height: 0;
      border-top: 22px solid transparent;
      border-bottom: 22px solid transparent;
      border-right: 44px solid #ECEEFE;
      filter: drop-shadow(0 0 8px rgba(236, 238, 254, 0.8));
    }

    .hub {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ECEEFE 0%, #a0a8f0 60%, #6070d0 100%);
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
      border: 4px solid #0C121D;
    }

    .btn-spin {
      margin-top: 32px;
      padding: 16px 56px;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: none;
      border-radius: 50px;
      background: #0D23C9;
      color: #ECEEFE;
      cursor: pointer;
      box-shadow: 0 6px 24px rgba(13, 35, 201, 0.5);
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
    }

    .btn-spin:hover:not(:disabled) {
      transform: translateY(-3px);
      background: #1A30D6;
      box-shadow: 0 10px 32px rgba(13, 35, 201, 0.7);
    }

    .btn-spin:disabled { opacity: 0.5; cursor: not-allowed; }

    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 20px;
      max-width: 500px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      color: rgba(236, 238, 254, 0.75);
    }

    .legend-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1px solid rgba(236,238,254,0.3);
    }

    /* ── Result modal ── */
    .result-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(12, 18, 29, 0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .result-overlay.show { display: flex; }

    .result-card {
      background: linear-gradient(135deg, #0C121D, #0D1A3A);
      border: 2px solid #0D23C9;
      border-radius: 24px;
      padding: 48px 56px;
      text-align: center;
      box-shadow: 0 0 60px rgba(13, 35, 201, 0.4);
      animation: pop-in 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 380px;
    }

    @keyframes pop-in {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .result-img {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 16px;
    }

    .result-emoji { font-size: 4rem; margin-bottom: 16px; }

    .result-title {
      font-size: 1rem;
      color: rgba(236, 238, 254, 0.55);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .result-prize {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #ECEEFE, #0D23C9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 32px;
    }

    .btn-close {
      padding: 12px 36px;
      font-size: 1rem;
      font-weight: 700;
      border: 2px solid #0D23C9;
      border-radius: 50px;
      background: transparent;
      color: #ECEEFE;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-close:hover { background: #0D23C9; }
  </style>
</head>
<body>

  <h1>Tentez votre chance !</h1>
  <p class="subtitle">Faites tourner la roue pour gagner votre cadeau</p>

  <div class="wheel-wrapper">
    <canvas id="wheel" width="420" height="420"></canvas>
    <div class="pointer"></div>
    <div class="hub"></div>
  </div>

  <button class="btn-spin" id="spinBtn" onclick="spin()">Tourner</button>
  <div class="spin-counter" id="spinCounter"></div>
  <div class="legend" id="legend"></div>

  <!-- Modal résultat -->
  <div class="result-overlay" id="resultOverlay">
    <div class="result-card">
      <div id="resultMedia"></div>
      <div class="result-title">Félicitations ! Vous avez gagné :</div>
      <div class="result-prize" id="resultPrize"></div>
      <button class="btn-close" onclick="closeResult()">Rejouer</button>
    </div>
  </div>

  <script>
    const pokemonColors = ['#0D23C9','#1A30CF','#0A1A9A','#2C41DC','#0D23C9','#1A30CF','#0A1A9A','#2C41DC','#0D23C9','#1A30CF'];

    const segments = [
      ...pokemonColors.map((color, i) => ({
        id: `pk${i+1}`, label: "1 Booster\nPokémon", weight: 9, color, image: "pokemon.png"
      })),
      { id: 'paire',   label: "Une Paire\nOfferte", weight: 10, color: "#4A5EE8", image: "sneakers.png" },
      { id: 'airpods', label: "Paire de\nAirPods",  weight: 0,  color: "#3347D4", image: "airpods.png" },
    ];

    const canvas = document.getElementById('wheel');
    const ctx = canvas.getContext('2d');
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const radius = 196;

    let spinCount    = parseInt(localStorage.getItem('spinCount')   || '0');
    let currentAngle = parseFloat(localStorage.getItem('wheelAngle') || '0');
    let spinning = false;

    /* ─── Preload images ─── */
    const loadedImages = {};
    let imagesLoaded = 0;
    const imageKeys = [...new Set(segments.filter(s => s.image).map(s => s.image))];

    function preloadImages(callback) {
      if (imageKeys.length === 0) { callback(); return; }
      imageKeys.forEach(src => {
        const img = new Image();
        img.onload = img.onerror = () => { if (++imagesLoaded === imageKeys.length) callback(); };
        img.src = src;
        loadedImages[src] = img;
      });
    }

    /* ─── Arcs ─── */
    function getArcs() {
      const sweep = (2 * Math.PI) / segments.length;
      return segments.map((seg, i) => ({ ...seg, start: i * sweep, sweep }));
    }

    /* ─── Dessin ─── */
    function drawWheel(rotation) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const arcs = getArcs();

      for (const arc of arcs) {
        const s = arc.start + rotation;
        const e = s + arc.sweep;

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, s, e);
        ctx.closePath();
        ctx.fillStyle = arc.color;
        ctx.fill();

        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, radius, s, e);
        ctx.closePath();
        ctx.strokeStyle = 'rgba(236,238,254,0.2)';
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(cx, cy);
        ctx.rotate(s + arc.sweep / 2);

        if (arc.image && loadedImages[arc.image]?.naturalWidth > 0) {
          const imgSize = 52;
          const imgCx = radius - 70;
          ctx.drawImage(loadedImages[arc.image], imgCx - imgSize / 2, -imgSize / 2, imgSize, imgSize);
        }

        ctx.restore();
      }

      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, 2 * Math.PI);
      ctx.strokeStyle = 'rgba(236,238,254,0.15)';
      ctx.lineWidth = 6;
      ctx.stroke();
    }

    /* ─── Légende ─── */
    const legendEl = document.getElementById('legend');
    [
      { label: '1 Booster Pokémon', color: '#0D23C9' },
      { label: 'Une Paire Offerte', color: '#4A5EE8' },
      { label: 'Paire de AirPods',  color: '#3347D4' },
    ].forEach(item => {
      const el = document.createElement('div');
      el.className = 'legend-item';
      el.innerHTML = `<div class="legend-dot" style="background:${item.color}"></div>${item.label}`;
      legendEl.appendChild(el);
    });

    /* ─── Compteur (caché) ─── */
    function updateCounter() {}

    /* ─── Gagnant ─── */
    function pickWinner() {
      if (spinCount % 100 === 0) return segments.findIndex(s => s.id === 'airpods');
      const eligible = segments.filter(s => s.id !== 'airpods');
      const total = eligible.reduce((s, x) => s + x.weight, 0);
      let r = Math.random() * total;
      for (const seg of eligible) {
        r -= seg.weight;
        if (r < 0) return segments.indexOf(seg);
      }
      return segments.indexOf(eligible[eligible.length - 1]);
    }

    /* ─── Spin ─── */
    function spin() {
      if (spinning) return;
      spinning = true;
      spinCount++;
      localStorage.setItem('spinCount', spinCount);
      document.getElementById('spinBtn').disabled = true;

      const arcs = getArcs();
      const winnerIndex = pickWinner();
      const winnerArc = arcs[winnerIndex];

      const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
      const winnerMid  = winnerArc.start + winnerArc.sweep / 2;
      const jitter     = (Math.random() - 0.5) * winnerArc.sweep * 0.6;
      const targetAngle = -winnerMid - jitter;
      const finalAngle  = currentAngle + (targetAngle - currentAngle % (2 * Math.PI) + 2 * Math.PI * 10 + extraSpins);

      const duration  = 4500 + Math.random() * 1000;
      const startAngle = currentAngle;
      const startTime  = performance.now();
      const easeOut = t => 1 - Math.pow(1 - t, 4);

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        currentAngle = startAngle + (finalAngle - startAngle) * easeOut(t);
        drawWheel(currentAngle);
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          currentAngle = finalAngle;
          localStorage.setItem('wheelAngle', currentAngle);
          spinning = false;
          showResult(winnerIndex);
        }
      }

      requestAnimationFrame(frame);
    }

    /* ─── Résultat ─── */
    function showResult(index) {
      const seg = segments[index];
      const mediaEl = document.getElementById('resultMedia');
      mediaEl.innerHTML = (seg.image && loadedImages[seg.image]?.naturalWidth > 0)
        ? `<img class="result-img" src="${seg.image}" alt="${seg.label}">`
        : `<div class="result-emoji">${seg.emoji ?? '🎁'}</div>`;
      document.getElementById('resultPrize').textContent = seg.label.replace('\n', ' ');
      document.getElementById('resultOverlay').classList.add('show');
    }

    function closeResult() {
      document.getElementById('resultOverlay').classList.remove('show');
      document.getElementById('spinBtn').disabled = false;
    }

    /* ─── Init ─── */
    preloadImages(() => drawWheel(currentAngle));
  </script>
</body>
</html>
